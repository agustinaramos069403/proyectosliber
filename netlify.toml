[dev]
  command = "npm run dev"
  targetPort = 4321

[build]
  command = "npm run build"
  publish = "dist"

# Astro inlines PUBLIC_* at build time. Without this, wa.me uses the clinic default in src/config.ts.
# Override or remove in Netlify UI when you publish the real WhatsApp number.
[build.environment]
  PUBLIC_WHATSAPP_NUMBER = "15556489769"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# WhatsApp Cloud API (Meta) webhook URL after deploy:
# https://YOUR_SITE.netlify.app/.netlify/functions/meta-whatsapp-webhook
[functions]
  directory = "netlify/functions"
