[dev]
  command = "npm run dev"
  targetPort = 4321

[build]
  command = "npm run build"
  publish = "dist"

# Astro inlines PUBLIC_* at build time. wa.me uses this E.164 number (digits only, no +).
# +54 9 379 498 3065 — production clinic line. Override in Netlify UI only if you need a different number.
[build.environment]
  PUBLIC_WHATSAPP_NUMBER = "5493794983065"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# WhatsApp Cloud API (Meta) webhook URL after deploy:
# https://YOUR_SITE.netlify.app/.netlify/functions/meta-whatsapp-webhook
[functions]
  directory = "netlify/functions"
